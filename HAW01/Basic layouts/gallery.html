    <script>
        const dropdownBtn = document.getElementById('dropdown-btn');
        const dropdownMenu = document.getElementById('dropdown-menu');

        // 1. Toggle visibility on click
        dropdownBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevents instant closing via global listener
            dropdownMenu.classList.toggle('hidden');
        });

        // 2. Global Close: If a user clicks anywhere else outside the layout box, shut the menu
        window.addEventListener('click', () => {
            if (!dropdownMenu.classList.contains('hidden')) {
                dropdownMenu.classList.add('hidden');
            }
        });
    </script>

    <style>
            /* 
    --------------
        FOOTER
    --------------
    */

    .site-footer{
        width:100%;
        position:sticky;
        bottom:0;
    }

    .footer-container{
                
        position:relative;
        height:50px;
        background:#3b82f6;
        overflow:hidden;
    }

    .bubble{
        
        position:absolute;
        bottom:-50px;
        background: rgba(255, 255, 255, 0.4);
        border-radius: 50%;
        pointer-events: none;
        animation: rise-and-fade 4s linear forwards;
        box-shadow: inset 0 0 10px rgba(255,255,255,0.5);

    }

    @keyframes rise-and-fade {
        0%{transform: translateY(0) scale(1); opacity: 0.6;}
        100%{transform: translateY(-180px) scale(1.2); opacity:0;}
                
    }

    .footer-copy{
        margin-top: 1rem;;
        text-align: center;
    }

    </style>

    <script>
        const footer = document.querySelector('.footer-container');

        function createBubble(){
            const bubble = document.createElement('div');
            const size = Math.random() * 30 +10 + 'px';

            bubble.classList.add('bubble');
            bubble.style.width = size;
            bubble.style.height = size;
            const check = bubble.style.left = Math.random() * 100 + '%';
            const duration = Math.random() * 2 + 3;
            bubble.style.animationDuration = duration + 's';
            footer.appendChild(bubble);

            setTimeout(() => {
                bubble.remove();
        }, duration * 1000);
    
        }

        setInterval(createBubble, 300);
    </script>
