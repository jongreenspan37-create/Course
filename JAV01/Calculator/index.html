<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <header>
        <h1 class="text-center text-5xl font-bold">Calculator</h1>
    </header>
    <main class="mt-4">
        <section id="calculator-container" class="px-4">
            <div id="calculator-body" class="mx-auto p-4 border border-slate-700 max-w-[400px] grid grid-cols-4 auto-rows-[60px] gap-2 rounded-xl">
                
                <div id="input-viewer" class="relative p-2 border-2 border-slate-600 col-span-4 rounded-lg text-right text-lg"></div>
                
                
                <div class="h-10 relative p-2 border-2 border-slate-600 col-span-4 rounded-lg text-right text-base">
                    <div id="result-viewer"></div>
                    <div id="error-message" class="hidden absolute top-0 right-4 px-2 py-1 border border-red-500 rounded-lg text-red-500 text-base z-100"></div>
                </div>
                
                    <button data-type="memory-clear" data-value="clear" class="w-full h-full flex items-center justify-center border border-slate-700 bg-orange-200 rounded-lg font-bold cursor-pointer hover:bg-orange-300 transition shadow-sm">MC</button>
                    <button data-type="clear" data-value="-" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm">C</button>
                    <button data-type="percentage" data-value="%" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm"></button>
                    <button data-type="operator" data-value="/" class="w-full h-full flex items-center justify-center border border-slate-400 bg-orange-200 rounded-lg font-medium cursor-pointer hover:bg-orange-300 transition shadow-sm">&divide;</button>

                    <button data-type="number" data-value="7" class="w-full h-full flex items-center justify-center border border-slate-700 bg-slate-200 rounded-lg font-bold cursor-pointer hover:bg-slate-300 transition shadow-sm">7</button>
                    <button data-type="number" data-value="8" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm">8</button>
                    <button data-type="number" data-value="9" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm">9</button>
                    <button data-type="operator" data-value="*" class="w-full h-full flex items-center justify-center border border-slate-400 bg-orange-200 rounded-lg font-medium cursor-pointer hover:bg-orange-300 transition shadow-sm">X</button>

                    <button data-type="number" data-value="4" class="w-full h-full flex items-center justify-center border border-slate-700 bg-slate-200 rounded-lg font-bold cursor-pointer hover:bg-slate-300 transition shadow-sm">4</button>
                    <button data-type="number" data-value="5" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm">5</button>
                    <button data-type="number" data-value="6" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm">6</button>
                    <button data-type="operator" data-value="-" class="w-full h-full flex items-center justify-center border border-slate-400 bg-orange-200 rounded-lg font-medium cursor-pointer hover:bg-orange-300 transition shadow-sm">-</button>

                    <button data-type="number" data-value="1" class="w-full h-full flex items-center justify-center border border-slate-700 bg-slate-200 rounded-lg font-bold cursor-pointer hover:bg-slate-300 transition shadow-sm">1</button>
                    <button data-type="number" data-value="2" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm">2</button>
                    <button data-type="number" data-value="3" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm">3</button>
                    <button data-type="operator" data-value="+" class="w-full h-full flex items-center justify-center border border-slate-400 bg-orange-200 rounded-lg font-medium cursor-pointer hover:bg-orange-300 transition shadow-sm">+</button>

                    
                    <button data-type="number" data-value="0" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer col-span-2 hover:bg-slate-300 transition shadow-sm">0</button>
                    <button data-type="point" data-value="." class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm">.</button>
                    <button data-type="equals" data-value="=" class="w-full h-full flex items-center justify-center border border-slate-400 bg-orange-200 rounded-lg font-medium cursor-pointer hover:bg-orange-300 transition shadow-sm">=</button>

            </div>
            <div class="text-center text-2xl font-bold" id="calc-array-view"></div>
            
        </section>

        <div class="p-2 mt-4 bg-slate-800 text-green-400 font-mono text-xs rounded border border-slate-700">
            <strong>calcArray:</strong> 
            <span id="array-debug-viewer">[]</span>
        </div>
    </main>
    <script src="script.js"></script>
    <footer>

    </footer>
    
</body>
</html>
