<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <header>
        <h1 class="text-center text-5xl font-bold">Calculator</h1>
    </header>
    <main class="mt-4">
        <section id="calculator-container" class="px-4">
            <div id="calculator-body" class="mx-auto p-4 border border-slate-700 max-w-[400px] grid grid-cols-4 auto-rows-[60px] gap-2 rounded-xl">
                
                <div id="result" class="border-2 border-slate-600 col-span-4 rounded-lg"></div>
                <div id="clear" class="w-full h-full flex items-center justify-center border border-slate-700 bg-orange-200 rounded-lg font-bold cursor-pointer hover:bg-orange-300 transition shadow-sm">C</div>
                <div id="plus-minus" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm">+/-</div>
                <div id="percentage" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm">%</div>
                <div id="divide" class="w-full h-full flex items-center justify-center border border-slate-400 bg-orange-200 rounded-lg font-medium cursor-pointer hover:bg-orange-300 transition shadow-sm">&divide;</div>

                <div id="seven" class="w-full h-full flex items-center justify-center border border-slate-700 bg-slate-200 rounded-lg font-bold cursor-pointer hover:bg-slate-300 transition shadow-sm">7</div>
                <div id="eight" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm">8</div>
                <div id="nine" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm">9</div>
                <div id="multiply" class="w-full h-full flex items-center justify-center border border-slate-400 bg-orange-200 rounded-lg font-medium cursor-pointer hover:bg-orange-300 transition shadow-sm">X</div>

                <div id="four" class="w-full h-full flex items-center justify-center border border-slate-700 bg-slate-200 rounded-lg font-bold cursor-pointer hover:bg-slate-300 transition shadow-sm">4</div>
                <div id="five" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm">5</div>
                <div id="six" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm">6</div>
                <div id="minus" class="w-full h-full flex items-center justify-center border border-slate-400 bg-orange-200 rounded-lg font-medium cursor-pointer hover:bg-orange-300 transition shadow-sm">-</div>

                <div id="one" class="w-full h-full flex items-center justify-center border border-slate-700 bg-slate-200 rounded-lg font-bold cursor-pointer hover:bg-slate-300 transition shadow-sm">1</div>
                <div id="two" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm">2</div>
                <div id="three" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm">3</div>
                <div id="plus" class="w-full h-full flex items-center justify-center border border-slate-400 bg-orange-200 rounded-lg font-medium cursor-pointer hover:bg-orange-300 transition shadow-sm">+</div>

                
                <div id="zero" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer col-span-2 hover:bg-slate-300 transition shadow-sm">0</div>
                <div id="point" class="w-full h-full flex items-center justify-center border border-slate-400 bg-slate-200 rounded-lg font-medium cursor-pointer hover:bg-slate-300 transition shadow-sm">.</div>
                <div id="equals" class="w-full h-full flex items-center justify-center border border-slate-400 bg-orange-200 rounded-lg font-medium cursor-pointer hover:bg-orange-300 transition shadow-sm">=</div>











            </div>
        </section>
    </main>
    <footer>

    </footer>
    
</body>
</html>
