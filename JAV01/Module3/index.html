<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/1ffbd0fc0b.js" crossorigin="anonymous"></script>
    <script type="module" src="index.js" defer></script>
</head>
<body>
    <header>
        <h1><span style="color:#60a5fa">B</span>ank 
            <span style="color:#60a5fa">A</span>ccount 
            <span style="color:#60a5fa">E</span>xample</h1>
    </header>
    <main>
    
        <form id="account-create" class="bankform">
            
            <div class="form-heading">
            <h2><span style="color:#60a5fa">C</span>reate 
                <span style="color:#60a5fa">A</span>ccount</h2>
                <button id="hint-btn" type="button" class="btn-alt">Hint</button>
            </div>
            <div class="form-body">
                
                <div class="field-group">
                    <label for="name"><span style="color:#60a5fa">N</span>ame *</label>
                    <input type="text" id="name" name="userName" required>
                    <!---->
                    
                </div>

                <div class="field-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="userEmail" required>
                    
                </div>

                
                <div class="field-group">
                    <label for="pass">Password</label>
                    <div>
                        <input type="password" id="pass" name="userPass" 
                        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*?[#?!@$%^&*]).{8,}"
                        title="Must contain at least 8 characters, including 1 uppercase, 
                        1 lowercase, 1 number, and 1 special character." required><span>
                        <i id = "pass-toggle" class="fa-regular fa-eye"></i></span>
                    </div>
                    <!-- 
                    -->
                </div>
                <button type="submit" class="btn">Create Account</button>
                

                <div id="name-hint" class="hint">Letters only</div>
                
                <div class = "hint"></div>
                <div id="pass-hints" class="hint">
                    <ul  class="hint hint-list">
                            <li id="req-length">8+ characters</li>
                            <li id="req-cap">One capital letter</li>
                            <li id="req-num">One number</li>
                            <li id="req-spec">One special character</li>
                    </ul>
                </div>
            
            </div>
        
        <script>
            
            document.getElementById('name').value = "Jon"
            document.getElementById('email').value = "jon@test.com"
            document.getElementById('pass').value = "passwordW2!"
            

        </script>
                   
        </form>

        <div id="logout" class="logout"><button id=" logout-btn" type="button" class = "btn">Log Out</button></div>

        <div id="account-details" class="bankform bankform-hide"></div>

        <form id="transaction-form" class="bankform-hide">
        
            <div id="transaction-actions" class="bankform bankform-reverse bankform-hide">
            
                <button type= "submit" name="transaction-type" value="deposit" class="btn">Deposit Funds</button>
                <button type ="submit" name="transaction-type" value = "withdraw" class="btn">Withdraw Funds</button>
                <div class= "transaction-wrapper">
                    <input type="number" id="transaction" name ="transaction" required>
                    <div id="error-message" class="error-message err-hide"></div>
                    <div id = "pass-check">
                        <input id ="pass-check-input" type="password" name="pass-check-input" 
                        placeholder ="Password" class="pass-check">
                    </div>
                </div>
            
            </div>
            
        
        </form>
        <table id="account-table" class="modern-table bankform-hide">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Balance</th>
                </tr>

            </thead>
            <tbody id="table-body">
                

            </tbody>
        </table>

        
    </main>
    <footer>
        <div id="footer-icons" class="footer-icons"><img src="icons/facebook.png" height= 15 width= 15></div>
        <div id="toggle" class="state1">Some 
            <button id="change">change</button>
        </div>
    </footer>
</body>
</html>
