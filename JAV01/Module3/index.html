<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/1ffbd0fc0b.js" crossorigin="anonymous"></script>
    <script type="module" src="index.js" defer></script>
</head>
<body>
    <header>
        <h1>Bank Account Example</h1>
    </header>
    
    <form id="accCreate" class="bankform">
        
        <h2>Create Account</h2>
        
        <div class="form-body">
            
            <div class="field-group">
                <label for="name">Name *</label>
                <input type="text" id="name" name="userName" required>
                <!---->
                
            </div>

            <div class="field-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="userEmail" required>
                
            </div>

            
            <div class="field-group">
                <label for="pass">Password</label>
                <div>
                    <input type="password" id="pass" name="userPass" 
                    pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*?[#?!@$%^&*]).{8,}"
                    title="Must contain at least 8 characters, including 1 uppercase, 
                    1 lowercase, 1 number, and 1 special character." required><span>
                    <i id = "pass-toggle" class="fa-regular fa-eye"></i></span>
                </div>
                   <!-- 
                -->
            </div>
            <button type="submit" class="btn">Create Account</button>
            

            <div id="name-hint" class="hint">Letters only</div>
            
            <div class = "field-group"></div>
            <div>
                <ul id="pass-hints" class="hint-list">
                        <li id="req-length">8+ characters</li>
                        <li id="req-cap">One capital letter</li>
                        <li id="req-num">One number</li>
                        <li id="req-spec">One special character</li>
                </ul>
            </div>
        
                
            

        </div>
    

        
    </form>

    <div id="account-details" class="bankform"></div>

    <div id="buttons" class="bankform bankform-reverse">
        <button id="add-funds" type= "button" class="btn">Deposit Funds</button>
        <button id="withdraws-funds" type ="button" class="btn">Withdraw Funds</button>
    </div>
    <table id="accountdetails" class="modern-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Account Number</th>
                <th>Balance</th>
            </tr>

        </thead>
        <tbody id="table-body">
            

        </tbody>
    </table>

    <div id="toggle" class="state1">Some words<button id="change">change</button></div>
</body>
</html>
